<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interprétation des Rêves – MarcoMedium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #3d1560;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Étoiles */
  .stars {
    position: fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 85%, rgba(201,168,224,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.6) 0%, transparent 100%);
  }

  .card {
    position: relative; z-index:1;
    background: linear-gradient(135deg, #4a1a6b, #3a1255);
    border: 1px solid rgba(201,168,224,0.3);
    border-radius: 8px;
    padding: 44px 40px;
    max-width: 680px;
    margin: 0 auto;
    color: #f0e6ff;
    box-shadow: 0 0 60px rgba(100,30,160,0.3);
  }

  .ornament { text-align:center; font-size:1.4rem; color:rgba(201,168,224,0.5); letter-spacing:0.6em; margin-bottom:12px; }

  .titre {
    text-align:center;
    font-family:'Cinzel Decorative',cursive;
    font-size:clamp(1.2rem,4vw,1.6rem);
    color:#c9a8e0;
    margin-bottom:8px;
    text-shadow:0 0 20px rgba(201,168,224,0.4);
  }
  .sous-titre {
    text-align:center;
    font-style:italic;
    color:rgba(201,168,224,0.65);
    font-size:1rem;
    margin-bottom:32px;
    line-height:1.6;
  }

  label {
    display:block;
    font-family:'Cinzel Decorative',cursive;
    font-size:0.72rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:#c9a8e0;
    margin-bottom:10px;
  }

  input[type=text] {
    width:100%;
    padding:14px 18px;
    background:rgba(30,5,60,0.6);
    border:1px solid rgba(201,168,224,0.3);
    border-radius:4px;
    color:#f0e6ff;
    font-family:Georgia,serif;
    font-size:1.05rem;
    outline:none;
    margin-bottom:22px;
    transition:border-color .3s;
  }
  input:focus { border-color:#c9a8e0; }

  textarea {
    width:100%;
    padding:16px 18px;
    background:rgba(30,5,60,0.6);
    border:1px solid rgba(201,168,224,0.3);
    border-radius:4px;
    color:#f0e6ff;
    font-family:Georgia,serif;
    font-size:1.05rem;
    outline:none;
    resize:vertical;
    min-height:160px;
    line-height:1.7;
    transition:border-color .3s;
    margin-bottom:22px;
  }
  textarea:focus { border-color:#c9a8e0; }
  textarea::placeholder { color:rgba(201,168,224,0.35); font-style:italic; }

  .divider { display:flex; align-items:center; gap:12px; margin:4px 0 24px; color:rgba(201,168,224,0.4); }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,224,.3),transparent); }

  .submit-btn {
    width:100%; padding:18px;
    background:transparent;
    border:1px solid #c9a8e0;
    border-radius:4px;
    color:#c9a8e0;
    font-family:'Cinzel Decorative',cursive;
    font-size:0.9rem;
    letter-spacing:.15em;
    cursor:pointer;
    transition:all .4s;
  }
  .submit-btn:hover { background:rgba(201,168,224,0.1); box-shadow:0 0 25px rgba(201,168,224,0.2); }

  .erreur { display:none; padding:12px; margin-top:10px; border:1px solid rgba(220,80,80,.4); border-radius:4px; background:rgba(220,80,80,.07); color:#e08888; font-style:italic; font-size:0.9rem; }
  .erreur.on { display:block; }

  /* Loading */
  .loading { display:none; text-align:center; padding:40px 0; }
  .lune { font-size:3rem; display:block; margin-bottom:14px; animation:float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .load-txt { font-style:italic; color:rgba(201,168,224,0.7); font-size:1.05rem; animation:fade 1.5s ease-in-out infinite; }
  @keyframes fade { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* Résultat */
  .result { display:none; margin-top:10px; animation:reveal .7s ease; }
  @keyframes reveal { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .result-header {
    display:flex; align-items:center; gap:14px;
    margin-bottom:24px; padding-bottom:20px;
    border-bottom:1px solid rgba(201,168,224,0.15);
  }
  .reve-icon { font-size:2.8rem; }
  .result-prenom { font-family:'Cinzel Decorative',cursive; font-size:1rem; color:#c9a8e0; }
  .result-sous { font-style:italic; color:rgba(201,168,224,0.6); font-size:0.85rem; margin-top:3px; }

  /* Blocs d'interprétation */
  .section-titre {
    font-family:'Cinzel Decorative',cursive;
    font-size:0.72rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:rgba(201,168,224,0.6);
    margin-bottom:14px;
    margin-top:6px;
  }

  .bloc {
    background:rgba(30,5,60,0.5);
    border:1px solid rgba(201,168,224,0.2);
    border-radius:6px;
    padding:18px 20px;
    margin-bottom:14px;
  }
  .bloc-titre {
    display:flex; align-items:center; gap:10px;
    margin-bottom:10px;
  }
  .bloc-icon { font-size:1.3rem; }
  .bloc-lbl {
    font-family:'Cinzel Decorative',cursive;
    font-size:0.62rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:#c9a8e0;
  }
  .bloc-txt {
    font-style:italic;
    font-size:1.05rem;
    line-height:1.8;
    color:rgba(240,230,255,0.9);
  }

  /* Message de Marco */
  .message-marco {
    padding:20px;
    border:1px solid rgba(201,168,224,0.25);
    border-radius:6px;
    text-align:center;
    margin-bottom:22px;
    background:rgba(30,5,60,0.3);
  }
  .marco-lbl {
    font-family:'Cinzel Decorative',cursive;
    font-size:0.68rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:rgba(201,168,224,0.55);
    margin-bottom:10px;
  }
  .marco-msg {
    font-style:italic;
    color:rgba(201,168,224,0.9);
    font-size:1.1rem;
    line-height:1.75;
  }

  .retry {
    display:block; margin:0 auto;
    padding:12px 32px;
    background:transparent;
    border:1px solid rgba(201,168,224,0.3);
    border-radius:4px;
    color:rgba(201,168,224,0.7);
    font-family:Georgia,serif;
    cursor:pointer; transition:all .3s;
    font-size:0.95rem; letter-spacing:.1em;
  }
  .retry:hover { border-color:#c9a8e0; color:#c9a8e0; }

  @media (max-width:600px) {
    body { padding:16px 12px; }
    .card { padding:28px 18px; }
    .titre { font-size:1.1rem; }
  }
</style>
</head>
<body>
<style>
.back-btn{display:inline-flex;align-items:center;gap:6px;margin:0 auto 18px;padding:0;background:none;border:none;color:rgba(201,168,224,0.55);font-family:Georgia,serif;font-size:0.88rem;cursor:pointer;text-decoration:none;transition:color .25s;width:fit-content;}
.back-btn:hover{color:#c9a8e0;}
</style>
<div style="max-width:700px;margin:0 auto;padding:14px 20px 0;">
<a class="back-btn" href="index.html">&#8592; Retour</a>
</div>
<div class="stars"></div>

<div class="card">
  <div class="ornament">&#10022; &#10023; &#10022;</div>
  <h1 class="titre">Interprétation des Rêves</h1>
  <p class="sous-titre">Racontez votre rêve à Marco — il vous révèle<br>les symboles cachés et le message de votre âme.</p>

  <div id="form-section">
    <label>Votre Prénom <span style="color:rgba(201,168,224,0.5);font-size:.65rem;">(optionnel)</span></label>
    <input type="text" id="r-prenom" placeholder="Pour une interprétation personnalisée...">

    <label>Racontez votre rêve en détail</label>
    <textarea id="r-reve" placeholder="Décrivez tout ce dont vous vous souvenez : les lieux, les personnes, les couleurs, les sensations, les émotions ressenties, les événements qui se sont produits..."></textarea>

    <div class="divider">&#10022;</div>
    <button class="submit-btn" id="r-submit" onclick="interpreter()">&#10023; Interpréter Mon Rêve &#10023;</button>
    <div class="erreur" id="r-err"></div>
  </div>

  <div class="loading" id="r-loading">
    <span class="lune">🌙</span>
    <p class="load-txt" id="r-load-txt">Marco explore les profondeurs de votre rêve...</p>
  </div>

  <div class="result" id="r-result"></div>
</div>

<script>
(function(){
  var WORKER = "https://super-band-24a0.marcomedium-com.workers.dev";
  var MSGS = [
    "Marco explore les profondeurs de votre rêve...",
    "Les symboles se révèlent un à un...",
    "Le monde onirique livre ses secrets...",
    "Marco déchiffre le message de votre âme..."
  ];
  var loadT;

  window.interpreter = function() {
    var prenom = document.getElementById("r-prenom").value.trim();
    var reve   = document.getElementById("r-reve").value.trim();
    var err    = document.getElementById("r-err");

    if (!reve || reve.length < 20) {
      err.textContent = "Veuillez décrire votre rêve avec plus de détails (minimum 20 caractères).";
      err.classList.add("on");
      return;
    }
    err.classList.remove("on");

    document.getElementById("form-section").style.display = "none";
    document.getElementById("r-loading").style.display = "block";

    var idx = 0;
    loadT = setInterval(function(){
      idx = (idx+1) % MSGS.length;
      document.getElementById("r-load-txt").textContent = MSGS[idx];
    }, 1800);

    var prenomPhrase = prenom ? "La personne s appelle " + prenom + ". " : "";

    var prompt = "Tu es Marco, medium reconnu et interprete des reves. Tu as une profonde connaissance de la symbolique onirique, de la psychologie des profondeurs et de la spiritualite.\n\n" +
      prenomPhrase + "Voici le reve a interpreter :\n\n\"" + reve + "\"\n\n" +
      "Fais une interpretation complete, profonde et bienveillante. Reponds UNIQUEMENT avec un objet JSON valide, sans aucun texte avant ni apres, sans backticks :\n" +
      "{" +
        "\"intro\":\"2 phrases d introduction sur l atmosphere generale du reve\"," +
        "\"symboles\":\"3-4 phrases sur les principaux symboles presents dans le reve et leur signification\"," +
        "\"emotions\":\"2-3 phrases sur les emotions et ce qu elles revelent de l etat interieur\"," +
        "\"message\":\"3-4 phrases sur le message profond et spirituel que ce reve vous envoie\"," +
        "\"conseil\":\"Un message personnel et spirituel de Marco base sur ce reve\"" +
      "}";

    fetch(WORKER, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({type:"numerologie", promptCustom: prompt})
    })
    .then(function(res){ return res.json().then(function(d){ return {ok:res.ok,data:d.data}; }); })
    .then(function(r){
      clearInterval(loadT);
      document.getElementById("r-loading").style.display = "none";
      if (!r.ok || r.data.error) throw new Error(r.data.error || "Erreur");
      var d = r.data;

      var now = new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
      var res = document.getElementById("r-result");

      res.innerHTML =
        "<div class='result-header'>" +
          "<div class='reve-icon'>🌙</div>" +
          "<div>" +
            "<div class='result-prenom'>" + (prenom ? prenom + " — " : "") + "Interprétation de votre rêve</div>" +
            "<div class='result-sous'>" + now + "</div>" +
          "</div>" +
        "</div>" +

        "<p class='section-titre'>Lecture du Rêve</p>" +

        "<div class='bloc'>" +
          "<div class='bloc-titre'><span class='bloc-icon'>✨</span><span class='bloc-lbl'>Atmosphère générale</span></div>" +
          "<p class='bloc-txt'>" + d.intro + "</p>" +
        "</div>" +

        "<div class='bloc'>" +
          "<div class='bloc-titre'><span class='bloc-icon'>🔮</span><span class='bloc-lbl'>Symboles & Significations</span></div>" +
          "<p class='bloc-txt'>" + d.symboles + "</p>" +
        "</div>" +

        "<div class='bloc'>" +
          "<div class='bloc-titre'><span class='bloc-icon'>💜</span><span class='bloc-lbl'>Émotions & État intérieur</span></div>" +
          "<p class='bloc-txt'>" + d.emotions + "</p>" +
        "</div>" +

        "<div class='bloc'>" +
          "<div class='bloc-titre'><span class='bloc-icon'>🌟</span><span class='bloc-lbl'>Message spirituel</span></div>" +
          "<p class='bloc-txt'>" + d.message + "</p>" +
        "</div>" +

        "<div class='message-marco'>" +
          "<div class='marco-lbl'>Message Personnel de Marco</div>" +
          "<p class='marco-msg'>\"" + d.conseil + "\"</p>" +
        "</div>" +

        "<button class='retry' onclick='reset()'>&#10022; Interpréter un autre rêve &#10022;</button>";

      res.style.display = "block";
    })
    .catch(function(err){
      clearInterval(loadT);
      document.getElementById("r-loading").style.display = "none";
      document.getElementById("form-section").style.display = "block";
      var e = document.getElementById("r-err");
      e.textContent = "Une erreur est survenue : " + err.message;
      e.classList.add("on");
    });
  };

  window.reset = function() {
    document.getElementById("r-result").style.display = "none";
    document.getElementById("r-result").innerHTML = "";
    document.getElementById("r-prenom").value = "";
    document.getElementById("r-reve").value = "";
    document.getElementById("form-section").style.display = "block";
  };

  // Auto-resize du textarea
  document.getElementById("r-reve").addEventListener("input", function(){
    this.style.height = "auto";
    this.style.height = Math.max(160, this.scrollHeight) + "px";
    // Notifier le parent pour redimensionner l'iframe
    var h = document.documentElement.scrollHeight || document.body.scrollHeight;
    window.parent.postMessage({ iframeHeight: h }, "*");
  });

  // Auto-resize pour iframe parent
  function sendHeight() {
    var h = document.documentElement.scrollHeight || document.body.scrollHeight;
    window.parent.postMessage({ iframeHeight: h }, "*");
  }
  window.addEventListener("load", sendHeight);
  var obs = new MutationObserver(sendHeight);
  obs.observe(document.body, { childList:true, subtree:true });

})();
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
</script>
</body>
</html>
