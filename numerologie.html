<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerologie – MarcoMedium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #3d1560;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    padding: 40px 20px;
  }
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .card { padding: 24px 16px !important; }
    .genre-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .chiffres { grid-template-columns: 1fr 1fr; gap: 10px; }
    .domaines { grid-template-columns: 1fr 1fr; gap: 10px; }
    .chiffre-num { font-size: 2rem !important; }
    .domaine-txt { font-size: 0.95rem !important; }
    .conseil-txt { font-size: 0.95rem !important; }
    .intro-txt { font-size: 0.95rem !important; }
    input[type=text], input[type=date] { font-size: 1rem !important; padding: 12px 14px !important; }
    .submit-btn { font-size: 0.8rem !important; padding: 15px !important; }
    .titre { font-size: 1.2rem !important; }
  }
  .card {
    background: linear-gradient(135deg, #4a1a6b, #3a1255);
    border: 1px solid rgba(201,168,224,0.3);
    border-radius: 8px;
    padding: 44px 40px;
    max-width: 660px;
    margin: 0 auto;
    color: #f0e6ff;
    box-shadow: 0 0 60px rgba(100,30,160,0.3);
  }
  .ornament {
    text-align: center;
    font-size: 1.4rem;
    color: rgba(201,168,224,0.5);
    letter-spacing: 0.6em;
    margin-bottom: 12px;
  }
  .titre {
    text-align: center;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.5rem;
    color: #c9a8e0;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(201,168,224,0.4);
  }
  .sous-titre {
    text-align: center;
    font-style: italic;
    color: rgba(201,168,224,0.7);
    font-size: 1.1rem;
    margin-bottom: 36px;
  }
  label {
    display: block;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c9a8e0;
    margin-bottom: 10px;
  }
  input[type=text], input[type=date] {
    width: 100%;
    padding: 15px 18px;
    background: rgba(30,5,60,0.6);
    border: 1px solid rgba(201,168,224,0.3);
    border-radius: 4px;
    color: #f0e6ff;
    font-family: Georgia, serif;
    font-size: 1.1rem;
    outline: none;
    margin-bottom: 24px;
    transition: border-color .3s;
  }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); }
  input:focus { border-color: #c9a8e0; }
  .genre-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .gbtn {
    padding: 15px 8px;
    background: rgba(30,5,60,0.6);
    border: 1px solid rgba(201,168,224,0.25);
    border-radius: 4px;
    color: rgba(201,168,224,0.7);
    font-family: Georgia, serif;
    font-size: 1.1rem;
    cursor: pointer;
    text-align: center;
    transition: all .3s;
  }
  .gbtn.active { background: rgba(201,168,224,0.15); border-color: #c9a8e0; color: #c9a8e0; }
  .divider { display:flex; align-items:center; gap:12px; margin:28px 0; color:rgba(201,168,224,0.4); }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,224,.3),transparent); }
  .submit-btn {
    width: 100%; padding: 18px;
    background: transparent;
    border: 1px solid #c9a8e0;
    border-radius: 4px;
    color: #c9a8e0;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.95rem;
    letter-spacing: .15em;
    cursor: pointer;
    transition: all .4s;
  }
  .submit-btn:hover { background: rgba(201,168,224,0.1); box-shadow: 0 0 25px rgba(201,168,224,0.2); }
  .loading { display:none; text-align:center; padding:40px 0; }
  .ball { font-size:3.2rem; display:block; margin-bottom:16px; animation:float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .load-txt { font-style:italic; color:rgba(201,168,224,0.7); font-size:1.1rem; animation:fade 1.5s ease-in-out infinite; }
  @keyframes fade { 0%,100%{opacity:.4} 50%{opacity:1} }
  .erreur { display:none; padding:14px 16px; margin-top:14px; border:1px solid rgba(220,80,80,.4); border-radius:4px; background:rgba(220,80,80,.07); color:#e08888; font-style:italic; font-size:1.05rem; }
  .result { display:none; margin-top:28px; animation:reveal .7s ease; }
  @keyframes reveal { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .res-header { text-align:center; margin-bottom:26px; padding-bottom:22px; border-bottom:1px solid rgba(201,168,224,0.15); }
  .res-prenom { font-family:'Cinzel Decorative',cursive; font-size:1.3rem; color:#c9a8e0; margin-bottom:6px; }
  .res-date { font-style:italic; color:rgba(201,168,224,0.6); font-size:1rem; }
  .section-title { font-family:'Cinzel Decorative',cursive; font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(201,168,224,0.6); margin-bottom:14px; margin-top:6px; }
  .chiffres { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:26px; }
  .chiffre-box { background:rgba(30,5,60,0.6); border:1px solid rgba(201,168,224,0.25); border-radius:6px; padding:20px 12px; text-align:center; }
  .chiffre-num { font-family:'Cinzel Decorative',cursive; font-size:2.8rem; color:#c9a8e0; display:block; text-shadow:0 0 20px rgba(201,168,224,0.5); }
  .chiffre-lbl { font-size:0.75rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(201,168,224,0.6); margin-top:8px; display:block; }
  .domaines { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:26px; }
  .domaine { background:rgba(30,5,60,0.5); border:1px solid rgba(201,168,224,0.2); border-radius:6px; padding:18px 16px; }
  .domaine-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .domaine-icon { font-size:1.4rem; }
  .domaine-name { font-family:'Cinzel Decorative',cursive; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:#c9a8e0; }
  .domaine-txt { font-style:italic; font-size:1.05rem; line-height:1.7; color:rgba(240,230,255,0.9); }
  .conseil { padding:20px; border:1px solid rgba(201,168,224,0.2); border-radius:6px; text-align:center; margin-bottom:24px; }
  .conseil-lbl { font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(201,168,224,0.5); font-family:'Cinzel Decorative',cursive; }
  .conseil-txt { margin-top:10px; font-style:italic; color:rgba(201,168,224,0.9); font-size:1.1rem; line-height:1.7; }
  .intro-txt { font-style:italic; color:rgba(240,230,255,0.9); font-size:1.1rem; line-height:1.7; margin-top:10px; }
  .retry { display:block; margin:0 auto; padding:12px 32px; background:transparent; border:1px solid rgba(201,168,224,0.3); border-radius:4px; color:rgba(201,168,224,0.7); font-family:Georgia,serif; cursor:pointer; transition:all .3s; font-size:1rem; letter-spacing:.1em; }
  .retry:hover { border-color:#c9a8e0; color:#c9a8e0; }
</style>
</head>
<body>
<style>
.back-btn{display:inline-flex;align-items:center;gap:6px;margin:0 auto 18px;padding:0;background:none;border:none;color:rgba(201,168,224,0.55);font-family:Georgia,serif;font-size:0.88rem;cursor:pointer;text-decoration:none;transition:color .25s;width:fit-content;}
.back-btn:hover{color:#c9a8e0;}
</style>
<div style="max-width:700px;margin:0 auto;padding:14px 20px 0;">
<a class="back-btn" href="index.html">&#8592; Retour</a>
</div>
<div class="card">
  <div class="ornament">&#10022; &#10023; &#10022;</div>
  <h1 class="titre">Votre Numerologie</h1>
  <p class="sous-titre">Decouvrez les secrets de votre chemin de vie</p>
  <div id="num-form">
    <label>Votre Prenom</label>
    <input type="text" id="num-prenom" placeholder="Entrez votre prenom...">
    <label>Votre Date de Naissance</label>
    <input type="date" id="num-date">
    <label>Votre Genre</label>
    <div class="genre-row">
      <button class="gbtn active" id="btn-femme">&#9792; Femme</button>
      <button class="gbtn" id="btn-homme">&#9794; Homme</button>
    </div>
    <div class="divider">&#10022;</div>
    <button class="submit-btn" id="num-submit">&#10023; Reveler Ma Numerologie &#10023;</button>
  </div>
  <div class="erreur" id="num-err"></div>
  <div class="loading" id="num-load">
    <span class="ball">&#10024;</span>
    <p class="load-txt" id="num-load-txt">Les nombres parlent pour vous...</p>
  </div>
  <div class="result" id="num-result"></div>
</div>
<script>
(function(){
  var WORKER = "https://super-band-24a0.marcomedium-com.workers.dev";
  var MSGS = ["Les nombres parlent pour vous...","Marco calcule votre chemin...","Les vibrations se revelent...","L univers dechiffre votre destinee..."];
  var genre = "femme";
  var loadT;

  document.getElementById("btn-femme").addEventListener("click", function(){
    genre = "femme";
    document.getElementById("btn-femme").classList.add("active");
    document.getElementById("btn-homme").classList.remove("active");
  });
  document.getElementById("btn-homme").addEventListener("click", function(){
    genre = "homme";
    document.getElementById("btn-homme").classList.add("active");
    document.getElementById("btn-femme").classList.remove("active");
  });

  function reduire(n) {
    if(n <= 9 || n === 11 || n === 22 || n === 33) return n;
    return reduire(String(n).split("").map(Number).reduce(function(a,b){ return a+b; }, 0));
  }
  function cheminDeVie(dateStr) {
    var parts = dateStr.split("-");
    var tous = (parts[0]+parts[1]+parts[2]).split("").map(Number);
    return reduire(tous.reduce(function(a,b){ return a+b; }, 0));
  }
  function anneePersonnelle(dateStr) {
    var parts = dateStr.split("-");
    var str = parts[2] + parts[1] + String(new Date().getFullYear());
    return reduire(str.split("").map(Number).reduce(function(a,b){ return a+b; }, 0));
  }

  document.getElementById("num-submit").addEventListener("click", function(){
    document.getElementById("num-err").style.display = "none";
    var prenom = document.getElementById("num-prenom").value.trim();
    var dateVal = document.getElementById("num-date").value;
    if(!prenom){ var e=document.getElementById("num-err"); e.textContent="Veuillez entrer votre prenom."; e.style.display="block"; return; }
    if(!dateVal){ var e2=document.getElementById("num-err"); e2.textContent="Veuillez entrer votre date de naissance."; e2.style.display="block"; return; }

    var cdv = cheminDeVie(dateVal);
    var ap = anneePersonnelle(dateVal);
    var anneeActuelle = new Date().getFullYear();
    var dateObj = new Date(dateVal + "T12:00:00");
    var dateLisible = dateObj.toLocaleDateString("fr-FR", {day:"numeric",month:"long",year:"numeric"});

    document.getElementById("num-form").style.display = "none";
    document.getElementById("num-load").style.display = "block";
    var idx = 0;
    loadT = setInterval(function(){ idx=(idx+1)%MSGS.length; document.getElementById("num-load-txt").textContent=MSGS[idx]; }, 1800);

    var prompt = "Tu es Marco, medium reconnu et numerologue spirituel. Tu donnes des lectures numerologiques en francais avec une voix mystique, chaleureuse et bienveillante.\n\n" +
      "La personne s appelle " + prenom + ", est de genre " + genre + ", nee le " + dateLisible + ".\n" +
      "Son chemin de vie est le " + cdv + ".\n" +
      "Son annee personnelle en " + anneeActuelle + " est le " + ap + ".\n\n" +
      "Fais une lecture numerologique complete et personnalisee. Reponds UNIQUEMENT avec un objet JSON valide, sans aucun texte avant ni apres, sans backticks :\n" +
      "{\"intro\":\"2 phrases mystiques d introduction personnalisees\",\"amour\":\"2-3 phrases sur la vie amoureuse\",\"finance\":\"2-3 phrases sur les finances\",\"travail\":\"2-3 phrases sur la vie professionnelle\",\"sante\":\"2-3 phrases sur la sante et l energie\",\"conseil\":\"Un message spirituel profond de Marco pour cette personne\"}";

    fetch(WORKER, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({type:"numerologie", promptCustom:prompt})
    })
    .then(function(res){ return res.json().then(function(d){ return {ok:res.ok,data:d.data}; }); })
    .then(function(r){
      clearInterval(loadT);
      document.getElementById("num-load").style.display = "none";
      if(!r.ok || r.data.error) throw new Error(r.data.error || "Erreur");
      var n = r.data;
      var result = document.getElementById("num-result");
      result.innerHTML =
        "<div class='res-header'><div class='res-prenom'>" + prenom + "</div><div class='res-date'>Nee le " + dateLisible + "</div></div>" +
        "<p class='section-title'>Vos Nombres</p>" +
        "<div class='chiffres'>" +
          "<div class='chiffre-box'><span class='chiffre-num'>" + cdv + "</span><span class='chiffre-lbl'>Chemin de Vie</span></div>" +
          "<div class='chiffre-box'><span class='chiffre-num'>" + ap + "</span><span class='chiffre-lbl'>Annee Personnelle " + anneeActuelle + "</span></div>" +
        "</div>" +
        "<div class='conseil' style='margin-bottom:26px;'><div class='conseil-lbl'>Votre Portrait</div><p class='intro-txt'>" + n.intro + "</p></div>" +
        "<p class='section-title'>Votre Lecture</p>" +
        "<div class='domaines'>" +
          "<div class='domaine'><div class='domaine-head'><span class='domaine-icon'>&#128149;</span><span class='domaine-name'>Amour</span></div><p class='domaine-txt'>" + n.amour + "</p></div>" +
          "<div class='domaine'><div class='domaine-head'><span class='domaine-icon'>&#128184;</span><span class='domaine-name'>Finances</span></div><p class='domaine-txt'>" + n.finance + "</p></div>" +
          "<div class='domaine'><div class='domaine-head'><span class='domaine-icon'>&#9889;</span><span class='domaine-name'>Travail</span></div><p class='domaine-txt'>" + n.travail + "</p></div>" +
          "<div class='domaine'><div class='domaine-head'><span class='domaine-icon'>&#127807;</span><span class='domaine-name'>Sante</span></div><p class='domaine-txt'>" + n.sante + "</p></div>" +
        "</div>" +
        "<div class='conseil'><div class='conseil-lbl'>Message de Marco</div><p class='conseil-txt'>" + n.conseil + "</p></div>" +
        "<button class='retry' id='num-retry'>&#10022; Nouvelle Lecture &#10022;</button>";
      result.style.display = "block";
      document.getElementById("num-retry").addEventListener("click", function(){
        result.style.display = "none";
        document.getElementById("num-form").style.display = "block";
      });
    })
    .catch(function(err){
      clearInterval(loadT);
      document.getElementById("num-load").style.display = "none";
      document.getElementById("num-form").style.display = "block";
      var e = document.getElementById("num-err");
      e.textContent = "Les nombres sont troubles : " + err.message;
      e.style.display = "block";
    });
  });
})();
</script>

<script>
// Auto-resize pour iframe parent
function sendHeight() {
  var h = document.documentElement.scrollHeight || document.body.scrollHeight;
  window.parent.postMessage({ iframeHeight: h }, '*');
}
window.addEventListener('load', sendHeight);
window.addEventListener('resize', sendHeight);
// Observer les changements de contenu
var obs = new MutationObserver(sendHeight);
obs.observe(document.body, { childList: true, subtree: true, attributes: true });
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
</script>
</body>
</html>
